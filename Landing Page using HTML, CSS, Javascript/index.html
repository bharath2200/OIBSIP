<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TAJ Restaurant</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Poppins:wght@300;400;500;600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>
    <div class="yellow-bg">
        <svg viewBox="0 0 100 100" preserveAspectRatio="none">
            <path d="M100,0 L20,0 C60,30 -20,70 20,100 L100,100 Z" fill="#ffb700" />
        </svg>
    </div>

    <div class="container">
        <header>
            <a href="index.html" class="logo" style="text-decoration: none;">TAJ Restaurant</a>
            <nav>
                <ul class="nav-links">
                    <li><a href="index.html" class="active">Home</a></li>
                    <li><a href="menu.html">Menu</a></li>
                    <li><a href="about.html">About</a></li>
                    <li><a href="location.html">Location</a></li>
                    <li><a href="contact.html">Contact</a></li>
                </ul>
            </nav>
            <div class="header-icons">
                <i class="fa-solid fa-magnifying-glass"></i>
                <i class="fa-solid fa-bars"></i>
            </div>
        </header>

        <main class="main-content">
            <div class="left-section">
                <h3 class="subtitle">Are You Hungry?</h3>
                <h1 class="main-title">Don't Wait</h1>
                <p class="description">Let start to order food now</p>
                <button class="menu-btn" onclick="window.location.href='menu.html'">Check out Menu</button>

                <div class="small-plates">
                    <div class="plate-wrapper">
                        <img src="images/small_food_1_1780202786687.png" alt="Salad">
                    </div>
                    <div class="plate-wrapper">
                        <img src="images/small_food_2_1780202800711.png" alt="Pasta">
                    </div>
                    <div class="plate-wrapper">
                        <img src="images/small_food_3_1780202816729.png" alt="Chicken">
                    </div>
                    <div class="plate-wrapper">
                        <img src="images/small_food_4_1780202829976.png" alt="Egg">
                    </div>
                </div>
            </div>

            <div class="right-section">
                <div class="pizza-wrapper">
                    <div class="ring-border"></div>
                    <img src="images/large_pizza_1780202769891.png" alt="Large Pizza" class="large-pizza">
                </div>
            </div>
        </main>

        <div class="social-sidebar">
            <a href="#"><i class="fa-brands fa-facebook-f"></i></a>
            <a href="#"><i class="fa-brands fa-twitter"></i></a>
            <a href="#"><i class="fa-brands fa-instagram"></i></a>
            <a href="#"><i class="fa-brands fa-whatsapp"></i></a>
        </div>
    </div>
    <script src="script.js"></script>
</body>

</html>
