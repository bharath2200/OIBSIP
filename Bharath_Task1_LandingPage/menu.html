<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TAJ Restaurant - Menu</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Poppins:wght@300;400;500;600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>
    <div class="yellow-bg">
        <svg viewBox="0 0 100 100" preserveAspectRatio="none">
            <path d="M100,0 L20,0 C60,30 -20,70 20,100 L100,100 Z" fill="#ffb700" />
        </svg>
    </div>

    <div class="container">
        <header>
            <a href="index.html" class="logo" style="text-decoration: none;">TAJ Restaurant</a>
            <nav>
                <ul class="nav-links">
                    <li><a href="index.html">Home</a></li>
                    <li><a href="menu.html" class="active">Menu</a></li>
                    <li><a href="about.html">About</a></li>
                    <li><a href="location.html">Location</a></li>
                    <li><a href="contact.html">Contact</a></li>
                </ul>
            </nav>
            <div class="header-icons">
                <i class="fa-solid fa-magnifying-glass"></i>
                <i class="fa-solid fa-bars"></i>
            </div>
        </header>

        <main class="main-content">
            <div class="left-section">
                <h3 class="subtitle">Delicious Food</h3>
                <h1 class="main-title" style="font-size: 55px;">Special Items</h1>
                <ul class="description" style="list-style: none; padding: 0;">
                    <li style="margin-bottom: 12px; color: white;"><i class="fa-solid fa-star" style="color: #ffb700; margin-right: 8px;"></i> Taj Special Biryani</li>
                    <li style="margin-bottom: 12px; color: white;"><i class="fa-solid fa-star" style="color: #ffb700; margin-right: 8px;"></i> Mutton Mandi</li>
                    <li style="margin-bottom: 12px; color: white;"><i class="fa-solid fa-star" style="color: #ffb700; margin-right: 8px;"></i> Chicken Tikka Masala</li>
                    <li style="margin-bottom: 12px; color: white;"><i class="fa-solid fa-star" style="color: #ffb700; margin-right: 8px;"></i> Paneer Butter Masala</li>
                </ul>
                <button class="menu-btn" onclick="window.location.href='contact.html'">Order Now</button>
            </div>

            <div class="right-section">
                <div class="pizza-wrapper">
                    <div class="ring-border"></div>
                    <img src="images/small_food_1_1780202786687.png" alt="Menu" class="large-pizza">
                </div>
            </div>
        </main>

        <div class="social-sidebar">
            <a href="#"><i class="fa-brands fa-facebook-f"></i></a>
            <a href="#"><i class="fa-brands fa-twitter"></i></a>
            <a href="#"><i class="fa-brands fa-instagram"></i></a>
            <a href="#"><i class="fa-brands fa-whatsapp"></i></a>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>

</html>
