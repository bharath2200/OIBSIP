<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TAJ Restaurant - Contact</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Poppins:wght@300;400;500;600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>
    <div class="yellow-bg">
        <svg viewBox="0 0 100 100" preserveAspectRatio="none">
            <path d="M100,0 L20,0 C60,30 -20,70 20,100 L100,100 Z" fill="#ffb700" />
        </svg>
    </div>

    <div class="container">
        <header>
            <a href="index.html" class="logo" style="text-decoration: none;">TAJ Restaurant</a>
            <nav>
                <ul class="nav-links">
                    <li><a href="index.html">Home</a></li>
                    <li><a href="menu.html">Menu</a></li>
                    <li><a href="about.html">About</a></li>
                    <li><a href="location.html">Location</a></li>
                    <li><a href="contact.html" class="active">Contact</a></li>
                </ul>
            </nav>
            <div class="header-icons">
                <i class="fa-solid fa-magnifying-glass"></i>
                <i class="fa-solid fa-bars"></i>
            </div>
        </header>

        <main class="main-content">
            <div class="left-section">
                <h3 class="subtitle">Get in Touch</h3>
                <h1 class="main-title" style="font-size: 55px;">Contact Us</h1>
                <form id="contact-form" style="width: 100%; max-width: 400px; margin-bottom: 20px;">
                    <input type="text" id="name" placeholder="Your Name" style="width: 100%; padding: 12px 15px; margin-bottom: 15px; border-radius: 25px; border: 1px solid rgba(255,255,255,0.4); background: transparent; color: white; font-family: 'Poppins', sans-serif;" required>
                    <textarea id="message" placeholder="Your Message" rows="4" style="width: 100%; padding: 12px 15px; margin-bottom: 15px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.4); background: transparent; color: white; font-family: 'Poppins', sans-serif; resize: none;" required></textarea>
                    <button type="submit" class="menu-btn" style="margin-bottom: 0; width: 100%;">Submit</button>
                </form>
            </div>

            <div class="right-section">
                <div class="pizza-wrapper">
                    <div class="ring-border"></div>
                    <img src="images/small_food_4_1780202829976.png" alt="Contact" class="large-pizza">
                </div>
            </div>
        </main>

        <div class="social-sidebar">
            <a href="#"><i class="fa-brands fa-facebook-f"></i></a>
            <a href="#"><i class="fa-brands fa-twitter"></i></a>
            <a href="#"><i class="fa-brands fa-instagram"></i></a>
            <a href="#"><i class="fa-brands fa-whatsapp"></i></a>
        </div>
    </div>
    
    <script src="script.js"></script>
    <script>
        document.getElementById('contact-form')?.addEventListener('submit', function(e) {
            e.preventDefault();
            alert("Thank you for your message! We will get back to you soon.");
            this.reset();
        });
    </script>
</body>

</html>
