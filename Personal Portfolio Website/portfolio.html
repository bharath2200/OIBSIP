<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio - Bharath Marupaka</title>
    <link rel="stylesheet" href="style.css">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
</head>

<body>
    <header class="header">
        <a href="index.html" class="logo">Bharath.</a>

        <nav class="navbar" id="navbar">
            <a href="index.html">Home</a>
            <a href="about.html">About</a>
            <a href="service.html">Service</a>
            <a href="portfolio.html" class="active">Portfolio</a>
            <a href="contact.html">Contact</a>
        </nav>

        <div class="menu-icon" id="menuIcon" onclick="toggleMenu()">
            <span></span>
            <span></span>
            <span></span>
        </div>
    </header>

    <section class="portfolio">
        <h2 class="heading">My <span>Portfolio</span></h2>

        <div class="portfolio-filter">
            <button class="filter-btn active" data-filter="all">All</button>
            <button class="filter-btn" data-filter="web">Web Dev</button>
            <button class="filter-btn" data-filter="design">Design</button>
        </div>

        <div class="portfolio-container">

            <!-- Personal Portfolio -->
            <div class="portfolio-box" data-category="web">
                <div class="portfolio-img">
                    <img src="assets/personal-portfolio.png" alt="Personal Portfolio">
                </div>
                <div class="portfolio-overlay">
                    <h3>Personal Portfolio</h3>
                    <p>Web Development</p>
                    <div class="portfolio-links">
                        <a href="#" title="View Live"><i class='bx bx-link-external'></i></a>
                        <a href="#" title="GitHub"><i class='bx bxl-github'></i></a>
                    </div>
                </div>
            </div>

            <!-- KRATOS Software Solutions -->
            <div class="portfolio-box" data-category="design">
                <div class="portfolio-img">
                    <img src="assets/KRATOS Website.png" alt="KRATOS Software Solutions">
                </div>
                <div class="portfolio-overlay">
                    <h3>KRATOS Software Solutions</h3>
                    <p>Business Landing Page</p>
                    <div class="portfolio-links">
                        <a href="https://kratos-software-solutions.vercel.app/" target="_blank" title="View Live"><i
                                class='bx bx-link-external'></i></a>
                        <a href="https://github.com/bharath2200/KRATOS-Software-Solutions" target="_blank"
                            title="GitHub"><i class='bx bxl-github'></i></a>
                    </div>
                </div>
            </div>

            <!-- LUXE HAVEN - E-Commerce (no live link) -->
            <div class="portfolio-box" data-category="web">
                <div class="portfolio-img">
                    <img src="assets/Business Landing Page.png" alt="LUXE HAVEN E-Commerce">
                </div>
                <div class="portfolio-overlay">
                    <h3>LUXE HAVEN</h3>
                    <p>Hotel Booking Website</p>
                    <div class="portfolio-links">
                        <a href="https://github.com/bharath2200" target="_blank" title="GitHub"><i
                                class='bx bxl-github'></i></a>
                    </div>
                </div>
            </div>

            <!-- FlowState Dashboard -->
            <div class="portfolio-box" data-category="web">
                <div class="portfolio-img">
                    <img src="assets/Developer Productivity Dashboard.png" alt="FlowState Dashboard">
                </div>
                <div class="portfolio-overlay">
                    <h3>FlowState Dashboard</h3>
                    <p>Developer Productivity</p>
                    <div class="portfolio-links">
                        <a href="https://bharath2200.github.io/flowstate/" target="_blank" title="View Live"><i
                                class='bx bx-link-external'></i></a>
                        <a href="https://github.com/bharath2200/flowstate" target="_blank" title="GitHub"><i
                                class='bx bxl-github'></i></a>
                    </div>
                </div>
            </div>

        </div>

        <div class="portfolio-cv">
            <a href="https://jolly-gold-xmqk699ahh.edgeone.app/Bharath%20_Web_Developer_Resume.pdf" target="_blank"
                class="btn-portfolio-pdf">
                <i class='bx bxs-file-pdf'></i> View Full Portfolio PDF
            </a>
        </div>
    </section>

    <script>
        const filterBtns = document.querySelectorAll('.filter-btn');
        const portfolioBoxes = document.querySelectorAll('.portfolio-box');

        filterBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                filterBtns.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');

                const filter = btn.getAttribute('data-filter');

                portfolioBoxes.forEach(box => {
                    const category = box.getAttribute('data-category');
                    if (filter === 'all' || filter === category) {
                        box.style.display = 'block';
                        setTimeout(() => box.style.opacity = '1', 10);
                    } else {
                        box.style.opacity = '0';
                        setTimeout(() => box.style.display = 'none', 300);
                    }
                });
            });
        });

        function toggleMenu() {
            document.getElementById('navbar').classList.toggle('open');
            document.getElementById('menuIcon').classList.toggle('open');
        }
        document.querySelectorAll('.navbar a').forEach(link => {
            link.addEventListener('click', () => {
                document.getElementById('navbar').classList.remove('open');
                document.getElementById('menuIcon').classList.remove('open');
            });
        });
    </script>

</body>

</html>
